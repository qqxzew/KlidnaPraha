<!DOCTYPE html>
<html lang="cs" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#18181b">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F9ED;</text></svg>">
    <title>Klidná Trasa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                        },
                        surface: {
                            light: '#ffffff',
                            dark: '#18181b',
                            lightSecondary: '#f4f4f5',
                            darkSecondary: '#27272a'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed; overscroll-behavior-y: none; touch-action: none; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none !important; }
        .mapboxgl-ctrl-logo { display: none !important; }
        .mapboxgl-ctrl-attrib { display: none !important; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; padding: 10px 0; touch-action: pan-y; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #e5e7eb; border-radius: 4px; }
        .dark input[type=range]::-webkit-slider-runnable-track { background: #3f3f46; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: currentColor;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            border: 3px solid #fff;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.15); }
        .dark input[type=range]::-webkit-slider-thumb { border-color: #18181b; }
        
        input[type=range]::-moz-range-track { width: 100%; height: 8px; cursor: pointer; background: #e5e7eb; border-radius: 4px; }
        .dark input[type=range]::-moz-range-track { background: #3f3f46; }
        input[type=range]::-moz-range-thumb {
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: currentColor;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            border: 3px solid #fff;
            border: none;
            transition: transform 0.1s;
        }
        input[type=range]::-moz-range-thumb:active { transform: scale(1.15); }
        .dark input[type=range]::-moz-range-thumb { box-shadow: 0 2px 6px rgba(0,0,0,0.5); }

        /* ── SOS ── */
        .pin-sos-you {
            background: rgba(15,23,42,0.92);
            backdrop-filter: blur(6px);
            border: 1.5px solid rgba(56,189,248,0.7);
            color: #e0f2fe;
            font-size: 0.7rem; font-weight: 600; padding: 4px 10px;
            border-radius: 20px; white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 0 4px rgba(56,189,248,0.12);
            letter-spacing: 0.01em;
        }
        .pin-sos-dest {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(6px);
            color: #111827;
            font-size: 0.7rem; font-weight: 600; padding: 4px 10px;
            border-radius: 20px; white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            border: 1.5px solid rgba(0,0,0,0.08);
            letter-spacing: 0.01em;
        }
        .dark .pin-sos-dest {
            background: rgba(30,30,35,0.95);
            color: #f9fafb;
            border-color: rgba(255,255,255,0.1);
        }

        /* SOS button pulse ring when active */
        @keyframes sos-ring {
            0%   { transform: scale(1);   opacity: 0.5; }
            100% { transform: scale(1.9); opacity: 0; }
        }
        .sos-pulse::before {
            content: '';
            position: absolute; inset: -6px;
            border-radius: inherit;
            border: 2px solid #34d399;
            animation: sos-ring 1.6s ease-out infinite;
            pointer-events: none;
        }
        #sosBtn { position: relative; overflow: visible; }

        /* SOS info card mode accent */
        #sosInfoCard { border-left: 3px solid #10b981; }
        #sosInfoCard.mode-med  { border-left-color: #3b82f6; }
        #sosInfoCard.mode-lib  { border-left-color: #8b5cf6; }

        /* ── Search Panel ── */
        #searchPanel {
            transition: opacity 0.22s ease, transform 0.22s ease;
        }
        #searchPanel.sp-hidden {
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none;
        }
        #searchPanel.sp-visible {
            opacity: 1;
            transform: translateY(0);
        }
        .addr-suggestion {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; cursor: pointer;
            transition: background 0.12s;
        }
        .addr-suggestion:hover, .addr-suggestion:active { background: rgba(0,0,0,0.05); }
        .dark .addr-suggestion:hover { background: rgba(255,255,255,0.07); }
        .addr-suggestion .addr-icon { color: #9ca3af; flex-shrink: 0; }
        .addr-suggestion .addr-main { font-size: 0.82rem; font-weight: 500; }
        .addr-suggestion .addr-sub { font-size: 0.72rem; color: #9ca3af; margin-top: 1px; }
        .addr-field-wrap { position: relative; }
        #addrFrom:focus, #addrTo:focus { outline: none; }
        .addr-active-dot { transition: background 0.2s; }

        /* ── Info cards slide up from footer ── */
        #routeInfoCard, #sosInfoCard {
            transition: transform 0.32s cubic-bezier(0.34,1.05,0.64,1), opacity 0.25s ease;
        }
        #routeInfoCard.card-hidden, #sosInfoCard.card-hidden {
            transform: translateY(calc(100% + 1.5rem));
            opacity: 0;
            pointer-events: none;
        }

        /* ── Float buttons slide up with card ── */
        #floatBtnsLeft, #floatBtnsRight { transition: bottom 0.32s cubic-bezier(0.34,1.05,0.64,1); }

        /* ── Toast ── */
        #toast {
            position: fixed; bottom: 6.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(24,24,27,0.92); color: #f4f4f5;
            padding: 10px 20px; border-radius: 24px;
            font-size: 0.85rem; font-weight: 500;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s; z-index: 9999;
            white-space: nowrap; border-left: 3px solid #ef4444;
        }
        .dark #toast { background: rgba(39,39,42,0.95); color: #e4e4e7; }
        #toast.show { opacity: 1; }

        /* ── Navigation mode ── */
        .nav-puck {
            width: 28px; height: 38px;
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none; user-select: none;
        }
        .nav-puck-arrow {
            width: 0; height: 0;
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-bottom: 15px solid #22c55e;
            filter: drop-shadow(0 1px 3px rgba(34,197,94,0.45));
        }
        .nav-puck-body {
            width: 18px; height: 18px; border-radius: 50%;
            background: #22c55e;
            border: 3px solid #fff;
            margin-top: -3px;
            box-shadow: 0 2px 8px rgba(34,197,94,0.5), 0 0 0 4px rgba(34,197,94,0.15);
            animation: nav-breathe 2.2s ease-in-out infinite;
        }
        @keyframes nav-breathe {
            0%, 100% { box-shadow: 0 2px 8px rgba(34,197,94,.5), 0 0 0 4px rgba(34,197,94,.15); }
            50%       { box-shadow: 0 2px 8px rgba(34,197,94,.7), 0 0 0 8px rgba(34,197,94,.07); }
        }
        #navHUD { transition: opacity 0.3s ease, transform 0.3s ease; }
        #navHUD.nav-hidden { opacity: 0; transform: translateY(-8px); pointer-events: none; }
    </style>
</head>
<body class="bg-surface-light dark:bg-surface-dark text-gray-900 dark:text-gray-100 overflow-hidden h-screen w-screen relative transition-colors duration-500 fixed inset-0 overscroll-none touch-none">

    <div id="map" class="absolute inset-0 z-0"></div>

    <div class="absolute inset-x-0 top-0 h-32 bg-gradient-to-b from-surface-light/80 dark:from-surface-dark/90 to-transparent z-10 pointer-events-none"></div>

    <div class="absolute top-12 left-4 right-4 z-20 flex justify-between items-start pointer-events-none">
        <div class="flex flex-col gap-3 pointer-events-auto">
        </div>
        
        <div class="flex flex-col gap-3 pointer-events-auto">
            <!-- DEV: remove this button block when done -->
            <button id="devThemeToggle" class="w-12 h-12 bg-surface-light dark:bg-surface-dark shadow-md dark:shadow-black/50 rounded-2xl flex items-center justify-center transition-transform active:scale-95 border border-gray-100 dark:border-gray-800" title="DEV: toggle theme">
                <i class="ph ph-sun text-xl text-gray-700 dark:text-gray-200"></i>
            </button>
            <!-- /DEV -->
            <button id="searchRouteBtn" class="w-12 h-12 bg-surface-light dark:bg-surface-dark shadow-md dark:shadow-black/50 rounded-2xl flex items-center justify-center transition-transform active:scale-95 border border-gray-100 dark:border-gray-800">
                <i class="ph ph-magnifying-glass text-xl text-gray-700 dark:text-gray-200"></i>
            </button>
        </div>
    </div>

    <!-- ═══════════ ADDRESS SEARCH PANEL ═══════════ -->
    <div id="searchPanel" class="absolute inset-x-4 sp-hidden" style="top:3.2rem; z-index:25;">
        <div class="bg-surface-light dark:bg-surface-dark rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 overflow-visible">

            <!-- panel header with close -->
            <div class="flex items-center justify-between px-3 pt-2.5 pb-1">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Trasa</span>
                <button id="closePanelBtn" class="p-1 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <i class="ph ph-x text-base text-gray-400"></i>
                </button>
            </div>

            <!-- FROM row -->
            <div class="flex items-center gap-2 px-3 py-2.5 border-b border-gray-100 dark:border-gray-800">
                <span class="addr-active-dot w-3 h-3 rounded-full border-2 border-brand-500 bg-white flex-shrink-0" id="dotFrom"></span>
                <input id="addrFrom" type="text" inputmode="search" autocomplete="off" autocorrect="off" spellcheck="false"
                       placeholder="Odkud…"
                       class="flex-1 text-sm bg-transparent outline-none placeholder:text-gray-400 dark:text-gray-100 min-w-0">
                <button id="geoFromBtn" title="Použít moji polohu"
                        class="flex-shrink-0 p-1.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <i class="ph ph-crosshair text-base text-brand-600 dark:text-brand-400"></i>
                </button>
            </div>

            <!-- TO row -->
            <div class="flex items-center gap-2 px-3 py-2.5">
                <i class="ph ph-map-pin text-base text-rose-500 flex-shrink-0"></i>
                <input id="addrTo" type="text" inputmode="search" autocomplete="off" autocorrect="off" spellcheck="false"
                       placeholder="Kam…"
                       class="flex-1 text-sm bg-transparent outline-none placeholder:text-gray-400 dark:text-gray-100 min-w-0">
                <button id="swapAddrBtn" title="Prohodit"
                        class="flex-shrink-0 p-1.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <i class="ph ph-arrows-down-up text-base text-gray-400"></i>
                </button>
            </div>

            <!-- Autocomplete suggestions -->
            <div id="addrSuggestions" class="hidden border-t border-gray-100 dark:border-gray-800 max-h-56 overflow-y-auto rounded-b-2xl"></div>
        </div>
    </div>



    <div id="floatBtnsRight" class="absolute bottom-28 right-4 z-20 flex flex-col gap-3">
        <button id="toggle3DBtn" class="bg-surface-light dark:bg-surface-dark shadow-md dark:shadow-black/50 p-3 rounded-2xl flex items-center justify-center transition-transform active:scale-95 border border-gray-100 dark:border-gray-800">
            <i class="ph ph-cube text-xl text-gray-700 dark:text-gray-200"></i>
        </button>
        <button id="locateBtn" class="bg-surface-light dark:bg-surface-dark shadow-md dark:shadow-black/50 p-3 rounded-2xl flex items-center justify-center transition-transform active:scale-95 border border-gray-100 dark:border-gray-800">
            <i class="ph ph-crosshair text-xl text-gray-700 dark:text-gray-200"></i>
        </button>
    </div>

    <!-- SOS floating button (bottom-left) -->
    <div id="floatBtnsLeft" class="absolute bottom-28 left-4 z-20">
        <button id="sosBtn" class="bg-white dark:bg-zinc-900 shadow-lg dark:shadow-black/60 pl-3 pr-5 py-3 rounded-2xl flex items-center justify-center gap-3 transition-transform active:scale-95 border border-emerald-100 dark:border-emerald-900/40">
            <span class="w-9 h-9 rounded-xl bg-emerald-500 flex items-center justify-center flex-shrink-0">
                <i class="ph-fill ph-leaf text-lg text-white"></i>
            </span>
            <div class="flex flex-col items-start">
                <span id="sosBtnText" class="text-sm font-bold text-gray-800 dark:text-gray-100 leading-tight">Potřebuji klid</span>
                <span class="text-xs text-gray-400 dark:text-zinc-500 leading-tight">Najít klidné místo</span>
            </div>
        </button>
    </div>

    <!-- Route info card (appears above footer after route is calculated) -->
    <div id="routeInfoCard" class="absolute inset-x-4 z-20 card-hidden bg-surface-light dark:bg-surface-dark rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 p-4" style="bottom:6.25rem;">
        <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-3 flex-1 min-w-0">
                <i class="ph ph-person-simple-walk text-xl text-brand-600 dark:text-brand-400 flex-shrink-0"></i>
                <div class="text-sm text-gray-700 dark:text-gray-200 flex gap-3">
                    <span id="routeDistText" class="font-semibold"></span>
                    <span class="text-gray-400 dark:text-gray-500">·</span>
                    <span id="routeTimeText" class="text-gray-500 dark:text-gray-400"></span>
                </div>
            </div>
            <button id="routeCloseBtnCard" class="flex-shrink-0 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xs font-semibold"><i class="ph ph-x text-base"></i></button>
        </div>
        <!-- Navigate button row, shown once route is computed -->
        <div id="navStartRow" class="hidden mt-3 pt-3 border-t border-gray-100 dark:border-gray-800">
            <button id="navStartBtn" class="w-full flex items-center justify-center gap-2 bg-brand-600 hover:bg-brand-700 text-white py-2.5 rounded-xl font-semibold text-sm active:scale-[0.97] transition-transform shadow-sm">
                <i class="ph-fill ph-navigation text-base"></i>
                Navigovat
            </button>
        </div>
    </div>

    <!-- Navigation HUD (shown during navigation) -->
    <div id="navHUD" class="nav-hidden absolute inset-x-4 z-30" style="top:3.25rem;">
        <div class="bg-surface-light/96 dark:bg-zinc-900/96 backdrop-blur-md rounded-2xl shadow-lg border border-gray-100 dark:border-zinc-800 px-4 py-3 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-brand-100 dark:bg-brand-900/40 flex items-center justify-center flex-shrink-0">
                <i class="ph-fill ph-navigation text-xl text-brand-600 dark:text-brand-400"></i>
            </div>
            <div class="flex-1 min-w-0">
                <div id="navDistRemain" class="font-bold text-base text-gray-900 dark:text-gray-100">—</div>
                <div id="navTimeRemain" class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Čekám na GPS…</div>
            </div>
            <button id="navStopBtn" class="flex-shrink-0 px-3 py-1.5 rounded-xl bg-gray-100 dark:bg-zinc-800 text-xs font-semibold text-gray-600 dark:text-gray-300 active:scale-95 transition-transform">
                Konec
            </button>
        </div>
    </div>

    <!-- SOS info card (appears above footer when SOS is active) -->
    <div id="sosInfoCard" class="absolute inset-x-4 z-20 card-hidden bg-surface-light dark:bg-surface-dark rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 p-4 overflow-hidden" style="bottom:6.25rem;">
        <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-3 flex-1 min-w-0">
                <span id="sosDestIcon" class="text-xl flex-shrink-0 leading-none">🌳</span>
                <div class="flex-1 min-w-0">
                    <div class="font-semibold text-sm text-gray-800 dark:text-gray-100 truncate" id="sosParkName">Park</div>
                    <div id="sosSpinner" class="hidden items-center gap-1.5 text-xs text-gray-400 mt-0.5">
                        <i class="ph ph-spinner-gap animate-spin text-xs"></i><span>Hledám trasu…</span>
                    </div>
                    <div id="sosRouteInfo" class="text-xs text-gray-500 dark:text-gray-400 flex gap-2 mt-0.5">
                        <span id="sosDistText"></span>
                        <span id="sosTimeSep" class="text-gray-300 dark:text-gray-600 hidden">·</span>
                        <span id="sosTimeText"></span>
                    </div>
                </div>
            </div>
            <button id="sosCancelBtn" class="flex-shrink-0 w-8 h-8 rounded-xl bg-gray-100 dark:bg-zinc-800 flex items-center justify-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
                <i class="ph ph-x text-sm"></i>
            </button>
        </div>
    </div>

    <!-- SOS Choice Modal -->
    <div id="sosChoiceOverlay" class="absolute inset-0 z-50 flex items-end justify-center pointer-events-none opacity-0" style="background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);transition:opacity 0.25s ease;">
        <div id="sosChoiceSheet" class="w-full bg-surface-light dark:bg-zinc-900 rounded-t-3xl shadow-2xl pointer-events-auto transform translate-y-full pb-safe" style="transition:transform 0.3s cubic-bezier(.32,1.15,.5,1);">
            <!-- handle -->
            <div class="flex justify-center pt-3 pb-1">
                <div class="w-10 h-1 bg-gray-200 dark:bg-zinc-700 rounded-full"></div>
            </div>
            <!-- header -->
            <div class="px-6 pt-3 pb-5">
                <p class="text-xs font-semibold uppercase tracking-widest text-gray-400 dark:text-zinc-500 mb-1">Tichá Praha</p>
                <h3 class="text-xl font-bold text-gray-900 dark:text-gray-100 leading-snug">Kam se chceš<br>uchýlit?</h3>
            </div>
            <!-- choices -->
            <div class="px-4 pb-3 flex flex-col gap-3">
                <button id="sosParkChoice" class="group w-full flex items-center gap-4 p-4 rounded-2xl bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-100 dark:border-emerald-900/60 active:scale-[0.98] transition-transform text-left">
                    <span class="w-12 h-12 rounded-xl bg-emerald-100 dark:bg-emerald-900/60 flex items-center justify-center flex-shrink-0">
                        <i class="ph-fill ph-tree text-2xl text-emerald-600 dark:text-emerald-400"></i>
                    </span>
                    <div>
                        <div class="font-semibold text-sm text-gray-900 dark:text-gray-100">Tichý park</div>
                        <div class="text-xs text-gray-500 dark:text-zinc-400 mt-0.5">Zelená oáza klidu nablízku</div>
                    </div>
                    <i class="ph ph-caret-right text-gray-300 dark:text-zinc-600 ml-auto"></i>
                </button>
                <button id="sosMedChoice" class="group w-full flex items-center gap-4 p-4 rounded-2xl bg-sky-50 dark:bg-sky-950/40 border border-sky-100 dark:border-sky-900/60 active:scale-[0.98] transition-transform text-left">
                    <span class="w-12 h-12 rounded-xl bg-sky-100 dark:bg-sky-900/60 flex items-center justify-center flex-shrink-0">
                        <i class="ph-fill ph-first-aid-kit text-2xl text-sky-600 dark:text-sky-400"></i>
                    </span>
                    <div>
                        <div class="font-semibold text-sm text-gray-900 dark:text-gray-100">Zdravotnické středisko</div>
                        <div class="text-xs text-gray-500 dark:text-zinc-400 mt-0.5">Nejbližší poliklinika</div>
                    </div>
                    <i class="ph ph-caret-right text-gray-300 dark:text-zinc-600 ml-auto"></i>
                </button>
                <button id="sosLibChoice" class="group w-full flex items-center gap-4 p-4 rounded-2xl bg-violet-50 dark:bg-violet-950/40 border border-violet-100 dark:border-violet-900/60 active:scale-[0.98] transition-transform text-left">
                    <span class="w-12 h-12 rounded-xl bg-violet-100 dark:bg-violet-900/60 flex items-center justify-center flex-shrink-0">
                        <i class="ph-fill ph-books text-2xl text-violet-600 dark:text-violet-400"></i>
                    </span>
                    <div>
                        <div class="font-semibold text-sm text-gray-900 dark:text-gray-100">Knihovna</div>
                        <div class="text-xs text-gray-500 dark:text-zinc-400 mt-0.5">Tiché místo ke čtení</div>
                    </div>
                    <i class="ph ph-caret-right text-gray-300 dark:text-zinc-600 ml-auto"></i>
                </button>
            </div>
            <button id="sosChoiceCancel" class="w-full py-4 text-sm text-gray-400 dark:text-zinc-500 transition-colors">Zrušit</button>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast"></div>

    <div class="absolute bottom-4 inset-x-4 h-20 bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-gray-700 rounded-3xl z-30 flex items-center justify-around px-2 pb-safe shadow-[0_8px_30px_rgba(0,0,0,0.12)] dark:shadow-[0_8px_30px_rgba(0,0,0,0.4)] pointer-events-auto">
        <button class="flex flex-col items-center justify-center w-28 h-full text-brand-600 dark:text-brand-500 rounded-2xl hover:bg-brand-50 dark:hover:bg-brand-900/20 transition-colors">
            <i class="ph-fill ph-map-pin text-3xl mb-1"></i>
            <span class="text-xs font-semibold">Mapa</span>
        </button>
        <button id="settingsBtn" class="flex flex-col items-center justify-center w-28 h-full text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-2xl transition-colors">
            <i class="ph ph-sliders text-3xl mb-1"></i>
            <span class="text-xs font-semibold">Nastavení</span>
        </button>
    </div>

    <div id="backdrop" class="absolute inset-0 bg-black/40 z-40 opacity-0 pointer-events-none transition-opacity duration-300"></div>

    <div id="bottomSheet" class="absolute bottom-0 inset-x-0 bg-surface-light dark:bg-surface-dark z-50 rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.12)] dark:shadow-[0_-8px_30px_rgba(0,0,0,0.5)] bottom-sheet-transition transform translate-y-full flex flex-col max-h-[85vh]">
        <div class="flex justify-center pt-3 pb-2 w-full" id="sheetHandle">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full"></div>
        </div>
        
        <div class="px-6 pb-4 pt-2 flex justify-between items-center border-b border-gray-100 dark:border-gray-800">
            <h2 class="text-xl font-semibold">Parametry trasy</h2>
            <button id="closeSheetBtn" class="p-2 -mr-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors">
                <i class="ph ph-x text-lg"></i>
            </button>
        </div>

        <div class="p-6 overflow-y-auto w-full">
            <div class="mb-8">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-sm font-semibold text-gray-800 dark:text-gray-200">Hluk</label>
                    <span id="noiseValText" class="text-xs font-bold text-blue-600 bg-blue-50 dark:text-blue-400 dark:bg-blue-900/30 px-3 py-1 rounded-full">Střední</span>
                </div>
                <div class="flex items-center gap-4 w-full">
                    <i class="ph ph-speaker-none text-2xl text-gray-400 w-8 text-center"></i>
                    <input type="range" id="noiseLevel" min="1" max="5" step="1" value="3" class="text-blue-500 dark:text-blue-500 focus:outline-none flex-1 touch-pan-y">
                    <i class="ph ph-speaker-high text-2xl text-gray-400 w-8 text-center"></i>
                </div>
            </div>

            <div class="mb-8">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-sm font-semibold text-gray-800 dark:text-gray-200">Kvalita ovzduší</label>
                    <span id="airValText" class="text-xs font-bold text-green-600 bg-green-50 dark:text-green-400 dark:bg-green-900/30 px-3 py-1 rounded-full">Střední</span>
                </div>
                <div class="flex items-center gap-4 w-full">
                    <i class="ph ph-leaf text-2xl text-gray-400 w-8 text-center"></i>
                    <input type="range" id="airLevel" min="1" max="5" step="1" value="3" class="text-green-500 dark:text-green-500 focus:outline-none flex-1 touch-pan-y">
                    <i class="ph ph-factory text-2xl text-gray-400 w-8 text-center"></i>
                </div>
            </div>

            <div class="mb-6">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-sm font-semibold text-gray-800 dark:text-gray-200">Maximální převýšení</label>
                    <span id="elevationValText" class="text-xs font-bold text-orange-600 bg-orange-50 dark:text-orange-400 dark:bg-orange-900/30 px-3 py-1 rounded-full">Střední</span>
                </div>
                <div class="flex items-center gap-4 w-full">
                    <i class="ph ph-arrows-out-line-horizontal text-2xl text-gray-400 w-8 text-center"></i>
                    <input type="range" id="elevationLevel" min="1" max="5" step="1" value="3" class="text-orange-500 dark:text-orange-500 focus:outline-none flex-1 touch-pan-y">
                    <i class="ph ph-trend-up text-2xl text-gray-400 w-8 text-center"></i>
                </div>
            </div>
            
            <div class="mt-8 mb-2">
                <button id="applySettingsBtn" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-4 rounded-xl shadow-md active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
                    <i class="ph ph-sliders text-xl"></i>
                    Aplikovat nastavení
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
